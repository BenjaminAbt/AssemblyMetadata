# Release Drafter Configuration
# Documentation: https://github.com/release-drafter/release-drafter

name-template: 'Version $RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# Categories for organizing release notes
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '🔧 Maintenance'
    labels:
      - 'maintenance'
      - 'chore'
      - 'refactor'
      - 'dependencies'
  - title: '📚 Documentation'
    labels:
      - 'documentation'
      - 'docs'
  - title: '⚡ Performance'
    labels:
      - 'performance'
  - title: '🔒 Security'
    labels:
      - 'security'

# Exclude certain labels from release notes
exclude-labels:
  - 'skip-changelog'
  - 'wip'

# Change template (how each PR is listed)
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&' # Escape special markdown characters

# Template for the release body
template: |
  ## What's Changed

  $CHANGES

  ## 📦 NuGet Packages

  The following packages are included in this release:

  | Package | Version | Description |
  |---|---|---|
  | `AssemblyMetadata` | $RESOLVED_VERSION | Metadata attributes for assemblies. |


  ### Installation

  ```bash
  dotnet add package AssemblyMetadata
  ```

  ## Contributors

  $CONTRIBUTORS

  ---

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

# Automatically label PRs based on modified files
autolabeler:
  - label: 'documentation'
    files:
      - '*.md'
      - 'docs/**/*'
  - label: 'bug'
    branch:
      - '/fix\/.+/'
    title:
      - '/fix/i'
  - label: 'feature'
    branch:
      - '/feature\/.+/'
    title:
      - '/feature/i'
  - label: 'dependencies'
    files:
      - '**/packages.lock.json'
      - '**/*.csproj'
      - 'Directory.Packages.props'
      - 'Directory.Build.props'
  - label: 'github-actions'
    files:
      - '.github/workflows/**/*'
  - label: 'tests'
    files:
      - 'tests/**/*'
      - '**/*Tests.cs'
      - '**/*Test.cs'
  - label: 'performance'
    files:
      - 'perf/**/*'
      - '**/*Benchmark*.cs'

# Version resolver (uses version from workflow input)
version-resolver:
  default: patch